<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>問題作成 - 一方そのころゲーム</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --primary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --bg: #f8f9fa;
            --share: #9b59b6;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            padding: 20px;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .container {
            max-width: 950px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            margin-top: 0;
        }

        .share-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f0f4f8;
            border-radius: 8px;
            align-items: center;
        }

        .share-btn {
            background: var(--share);
            color: white;
            padding: 10px 16px;
            font-size: 0.85rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .share-btn:hover {
            opacity: 0.9;
        }

        .title-settings {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            background: #fdf2f2;
            padding: 15px;
            border-radius: 8px;
        }

        .title-input-group {
            flex: 1;
        }

        .title-input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #666;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th {
            background: #eee;
            padding: 12px;
            border: 1px solid #ddd;
            font-size: 0.9rem;
        }

        td {
            padding: 5px;
            border: 1px solid #ddd;
        }

        input {
            width: 95%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.9rem;
            text-align: center;
            box-sizing: border-box;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            gap: 10px;
        }

        button {
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            border: none;
        }

        .add-btn {
            background: var(--success);
            color: white;
        }

        .start-btn {
            background: var(--primary);
            color: white;
            font-size: 1.2rem;
        }

        .remove-btn {
            background: var(--danger);
            color: white;
            padding: 5px 10px;
        }

        .qr-section {
            margin-top: 25px;
            background: #faf7ff;
            border: 2px dashed #c8a2ff;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .qr-section h3 {
            margin-top: 0;
        }

        #generated-url {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #666;
            word-break: break-all;
        }

        #qrcode {
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }

        .save-btn {
            margin-top: 20px;
            background: #16a085;
            color: white;
        }

        @media (max-width: 700px) {

            .title-settings {
                flex-direction: column;
            }

            table {
                font-size: 0.75rem;
            }

            input {
                font-size: 0.75rem;
            }

            .controls {
                flex-direction: column;
            }

            .start-btn,
            .add-btn {
                width: 100%;
            }

            .share-controls {
                flex-direction: column;
                align-items: stretch;
            }

            .share-btn {
                width: 100%;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <h2>問題作成エディタ</h2>

    <div class="share-controls">

        <span style="font-size: 0.85rem; font-weight: bold;">
            共有機能:
        </span>

        <button class="share-btn" onclick="copySNSLink()">
            SNS共有用リンクを生成しコピーする
        </button>

        <button class="share-btn" style="background: #7f8c8d;" onclick="importShareCode()">
            コードから読込
        </button>

    </div>

    <div class="title-settings">

        <div class="title-input-group">
            <label>左カラム名</label>
            <input type="text" id="main-title-left" value="オモコロ">
        </div>

        <div class="title-input-group">
            <label>右カラム名</label>
            <input type="text" id="main-title-right" value="マンガ">
        </div>

    </div>

    <table>

        <thead>
            <tr>
                <th style="width: 15%;">年号</th>
                <th>左テキスト</th>
                <th>右テキスト</th>
                <th style="width: 10%;">削除</th>
            </tr>
        </thead>

        <tbody id="table-body"></tbody>

    </table>

    <div class="controls">

        <button class="add-btn" onclick="addRow()">
            ＋ 行を追加
        </button>

        <button class="start-btn" onclick="saveAndStart()">
            ゲーム開始！
        </button>

    </div>

    <div class="qr-section">

        <h3>QRコード共有</h3>

        <p style="font-size:0.9rem; color:#666;">
            スマホで読み取ることで、作成した問題を直接遊べます
        </p>

        <div id="generated-url"></div>

        <div id="qrcode"></div>

        <button class="save-btn" onclick="saveQRCode()">
            QRコード画像を保存
        </button>

    </div>

</div>

<script>

    const defaultData = [
        ["2008/5", "加藤が「手頭顔寒」になる", "トリコと小松が出会う"],
        ["2010/6", "原宿が自分の卒アルを晒す", "ルフィが仲間の存在に気づく"],
        ["2011/12", "THE・チンゲポーカー", "刃牙が勇次郎に関節をキメる"],
        ["2012/1", "原宿が二代目編集長に就任", "レオリオが選挙で演説"],
        ["2013/3", "原宿がトロをかき集める", "ワシズが地獄に落ちる"],
        ["2014/8", "ARuFaがシャワーを美少女に", "暗黒大陸行きの船が出発"],
        ["2015/12", "ギャラクシーの睾丸が1個に", "鎧の巨人に雷槍が刺さる"],
        ["2016/1", "永田がチェジュ市へ旅行", "烏野高校が全国出場決定"],
        ["2017/6", "キショ松容疑者が逮捕", "炭治郎が煉獄の勝利を叫ぶ"],
        ["2018/10", "ARuFaがケツを展示", "二代目野見宿禰が登場"]
    ];

    let latestURL = "";

    window.onload = () => {

        const saved = JSON.parse(localStorage.getItem('timelineGameConfig'));

        if (saved) {
            loadConfig(saved);
        } else {
            defaultData.forEach(d => addRowWithData(d[0], d[1], d[2]));
        }
    };

    function addRowWithData(y="", l="", r="") {

        const tr = document.createElement('tr');

        tr.innerHTML = `
            <td><input type="text" class="in-year" value="${y}"></td>
            <td><input type="text" class="in-left" value="${l}"></td>
            <td><input type="text" class="in-right" value="${r}"></td>
            <td>
                <button class="remove-btn" onclick="this.parentElement.parentElement.remove()">
                    ×
                </button>
            </td>
        `;

        document.getElementById('table-body').appendChild(tr);
    }

    function addRow() {
        addRowWithData();
    }

    function getConfig() {

        const questions = [];

        document.querySelectorAll('#table-body tr').forEach((row, i) => {

            const l = row.querySelector('.in-left').value;

            if (l.trim()) {

                questions.push({
                    id: i + 1,
                    year: row.querySelector('.in-year').value,
                    left: l,
                    right: row.querySelector('.in-right').value
                });
            }
        });

        return {
            titleLeft: document.getElementById('main-title-left').value,
            titleRight: document.getElementById('main-title-right').value,
            questions
        };
    }

    function generateShareURL() {

        const config = getConfig();

        const base64 =
            btoa(unescape(encodeURIComponent(JSON.stringify(config))));

        return window.location.origin +
            window.location.pathname.replace('editor.html', 'index.html') +
            "?q=" + base64;
    }

    function copySNSLink() {

        latestURL = generateShareURL();

        navigator.clipboard.writeText(latestURL)
            .then(() => {

                alert("SNS共有用リンクをコピーしました！");

                document.getElementById('generated-url').innerText = latestURL;

                generateQRCode(latestURL);
            });
    }

    function generateQRCode(url) {

        const qrArea = document.getElementById('qrcode');

        qrArea.innerHTML = "";

        new QRCode(qrArea, {
            text: url,
            width: 220,
            height: 220
        });
    }

    function saveQRCode() {

        const canvas = document.querySelector('#qrcode canvas');

        if (!canvas) {
            alert("先にQRコードを生成してください");
            return;
        }

        const link = document.createElement('a');

        link.download = 'timeline-game-qr.png';

        link.href = canvas.toDataURL();

        link.click();
    }

    function importShareCode() {

        const code = prompt("コードを貼り付けてください");

        if (code) {

            try {

                loadConfig(
                    JSON.parse(decodeURIComponent(escape(atob(code))))
                );

                alert("読み込み完了");

            } catch(e) {

                alert("無効なコードです");
            }
        }
    }

    function loadConfig(c) {

        document.getElementById('main-title-left').value = c.titleLeft;

        document.getElementById('main-title-right').value = c.titleRight;

        document.getElementById('table-body').innerHTML = "";

        c.questions.forEach(q => {
            addRowWithData(q.year, q.left, q.right);
        });
    }

    function saveAndStart() {

        localStorage.setItem(
            'timelineGameConfig',
            JSON.stringify(getConfig())
        );

        window.location.href = 'index.html';
    }

</script>

</body>
</html>

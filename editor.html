<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>問題作成 - 年表並べ替えゲーム</title>
    <style>
        :root { --primary: #3498db; --success: #2ecc71; --danger: #e74c3c; --bg: #f8f9fa; }
        body { font-family: "Helvetica Neue", Arial, sans-serif; background: var(--bg); padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .title-settings { display: flex; gap: 20px; margin-bottom: 20px; background: #fdf2f2; padding: 15px; border-radius: 8px; }
        .title-input-group { flex: 1; }
        .title-input-group label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; color: #666; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #eee; padding: 12px; border: 1px solid #ddd; }
        td { padding: 10px; border: 1px solid #ddd; text-align: center; }
        input { width: 90%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
        .controls { display: flex; justify-content: space-between; margin-top: 20px; }
        button { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .add-btn { background: var(--success); color: white; }
        .start-btn { background: var(--primary); color: white; font-size: 1.2rem; }
        .remove-btn { background: var(--danger); color: white; padding: 5px 12px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center">問題作成エディタ</h2>

    <div class="title-settings">
        <div class="title-input-group">
            <label>左カラムのタイトル</label>
            <input type="text" id="main-title-left" value="オモコロ">
        </div>
        <div class="title-input-group">
            <label>右カラムのタイトル</label>
            <input type="text" id="main-title-right" value="マンガ">
        </div>
    </div>

    <table id="edit-table">
        <thead>
            <tr>
                <th>年号(ヒント)</th>
                <th>左側テキスト</th>
                <th>右側テキスト</th>
                <th>削除</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr>
                <td><input type="text" class="in-year" value="1100"></td>
                <td><input type="text" class="in-left" value="1"></td>
                <td><input type="text" class="in-right" value="a"></td>
                <td><button class="remove-btn" onclick="this.parentElement.parentElement.remove()">×</button></td>
            </tr>
        </tbody>
    </table>

    <div class="controls">
        <button class="add-btn" onclick="addRow()">＋ 行を追加</button>
        <button class="start-btn" onclick="saveAndStart()">この内容でゲーム開始！</button>
    </div>
</div>

<script>
    function addRow() {
        const tbody = document.getElementById('table-body');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" class="in-year"></td>
            <td><input type="text" class="in-left"></td>
            <td><input type="text" class="in-right"></td>
            <td><button class="remove-btn" onclick="this.parentElement.parentElement.remove()">×</button></td>
        `;
        tbody.appendChild(tr);
    }

    function saveAndStart() {
        const data = [];
        const rows = document.querySelectorAll('#table-body tr');
        rows.forEach((row, index) => {
            data.push({
                id: index + 1,
                year: row.querySelector('.in-year').value,
                left: row.querySelector('.in-left').value,
                right: row.querySelector('.in-right').value
            });
        });

        const config = {
            titleLeft: document.getElementById('main-title-left').value,
            titleRight: document.getElementById('main-title-right').value,
            questions: data
        };

        localStorage.setItem('timelineGameConfig', JSON.stringify(config));
        window.location.href = 'index.html';
    }
</script>
    <footer style="margin-top: auto; padding: 20px; font-size: 0.7rem; color: #888; text-align: center;">
    本プロジェクトは「<a href="https://www.youtube.com/@omocoro" target="_blank" style="color: #888;">オモコロ</a>」の動画企画をリスペクトして作成されたファンメイドプロジェクトです。
</footer>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>問題作成 - 一方そのころゲーム</title>
    <style>
        :root { --primary: #3498db; --success: #2ecc71; --danger: #e74c3c; --bg: #f8f9fa; }
        body { font-family: "Helvetica Neue", Arial, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; background: var(--bg); padding: 20px; color: #333; min-height: 100vh; display: flex; flex-direction: column; }
        .container { max-width: 950px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; }
        .title-settings { display: flex; gap: 20px; margin-bottom: 20px; background: #fdf2f2; padding: 15px; border-radius: 8px; }
        .title-input-group { flex: 1; }
        .title-input-group label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; color: #666; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; table-layout: fixed; }
        th { background: #eee; padding: 12px; border: 1px solid #ddd; font-size: 0.9rem; }
        td { padding: 5px; border: 1px solid #ddd; text-align: center; }
        input { width: 95%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; text-align: center; box-sizing: border-box; }
        .controls { display: flex; justify-content: space-between; margin-top: 20px; }
        button { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .add-btn { background: var(--success); color: white; }
        .start-btn { background: var(--primary); color: white; font-size: 1.2rem; }
        .remove-btn { background: var(--danger); color: white; padding: 5px 10px; }
        footer { margin-top: auto; padding: 20px; font-size: 0.7rem; color: #888; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center">問題作成エディタ</h2>

    <div class="title-settings">
        <div class="title-input-group">
            <label>左カラムのタイトル</label>
            <input type="text" id="main-title-left" value="オモコロ">
        </div>
        <div class="title-input-group">
            <label>右カラムのタイトル</label>
            <input type="text" id="main-title-right" value="マンガ">
        </div>
    </div>

    <table id="edit-table">
        <thead>
            <tr>
                <th style="width: 15%;">年号(ヒント)</th>
                <th>左側テキスト</th>
                <th>右側テキスト</th>
                <th style="width: 8%;">削除</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>

    <div class="controls">
        <button class="add-btn" onclick="addRow()">＋ 行を追加</button>
        <button class="start-btn" onclick="saveAndStart()">この内容でゲーム開始！</button>
    </div>
</div>

<footer>
    本プロジェクトは「<a href="https://www.youtube.com/channel/UCOx-oLP9tOhiYwSK_m-yVxA" target="_blank" style="color: #888;">オモコロチャンネル</a>」の動画企画をリスペクトして作成されたファンメイドプロジェクトです。
</footer>

<script>
    // 本家データをデフォルト値として設定
    const defaultData = [
        ["2008/5", "加藤が「手頭顔寒（てづかおさむ）」になる", "トリコと小松が出会う"],
        ["2010/6", "原宿が自分の卒アルをネットにさらす", "ルフィが「仲間がいる゛よ!!!!」と言う"],
        ["2011/12", "THE・チンゲポーカーが行われる", "刃牙が勇次郎と直接対決、関節をキメる"],
        ["2012/1", "原宿がオモコロ二代目編集長に就任", "レオリオがハンター選挙で演説する"],
        ["2013/3", "原宿がハーゲンダッツのトロをかき集める", "ワシズが地獄に落ちる"],
        ["2014/8", "ARuFaがシャワーを美少女にする", "暗黒大陸行きの船が出発する"],
        ["2015/12", "ギャラクシーの睾丸が一コになる", "鎧の巨人の両眼に「雷槍」が刺さる"],
        ["2016/1", "OLの永田がチェジュ市まで傷心旅行", "烏野高校男子バレー部の全国出場が決定"],
        ["2017/6", "キショ松容疑者が逮捕", "炭治郎が「煉獄さんは負けてない！」と言う"],
        ["2018/10", "ARuFaがケツを展示", "二代目野見宿禰がボルダリングする"]
    ];

    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem('timelineGameConfig'));
        if (saved && saved.questions.length > 0) {
            document.getElementById('main-title-left').value = saved.titleLeft;
            document.getElementById('main-title-right').value = saved.titleRight;
            saved.questions.forEach(q => addRowWithData(q.year, q.left, q.right));
        } else {
            defaultData.forEach(d => addRowWithData(d[0], d[1], d[2]));
        }
    };

    function addRowWithData(y="", l="", r="") {
        const tbody = document.getElementById('table-body');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" class="in-year" value="${y}"></td>
            <td><input type="text" class="in-left" value="${l}"></td>
            <td><input type="text" class="in-right" value="${r}"></td>
            <td><button class="remove-btn" onclick="this.parentElement.parentElement.remove()">×</button></td>
        `;
        tbody.appendChild(tr);
    }

    function addRow() { addRowWithData(); }

    function saveAndStart() {
        const data = [];
        const rows = document.querySelectorAll('#table-body tr');
        rows.forEach((row, index) => {
            const y = row.querySelector('.in-year').value;
            const l = row.querySelector('.in-left').value;
            const r = row.querySelector('.in-right').value;
            if (l.trim() !== "" || r.trim() !== "") {
                data.push({ id: index + 1, year: y, left: l, right: r });
            }
        });
        if (data.length === 0) { alert("問題を入力してください。"); return; }
        const config = {
            titleLeft: document.getElementById('main-title-left').value,
            titleRight: document.getElementById('main-title-right').value,
            questions: data
        };
        localStorage.setItem('timelineGameConfig', JSON.stringify(config));
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
